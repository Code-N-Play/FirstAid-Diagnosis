<!DOCTYPE html>
<html>

<head>
    <title>Offline mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f7fb;
            color: #1a2b4c;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: white;
            border-bottom: 1px solid #ddd;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: #1a2b4c;
            font-weight: 500;
        }

        .nav-links a.active {
            color: #2b6cff;
            border-bottom: 2px solid #2b6cff;
        }

        /* Container */
        .container {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        /* Upload Box */
        .upload-box {
            border: 2px dashed #ccc;
            border-radius: 15px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            width: 60%;
            background: #fff;
            cursor: pointer;
        }

        /* Button */
        .btn1 {
            background: #2ecc71;
            border: none;
            padding: 12px 25px;
            color: white;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;


        }

        /* Section Box */
        .box {
            background: #e9f2f3;
            padding: 20px;
            border-radius: 10px;
            margin: 20px auto;
            width: 90%;
            border: 1px solid #cde;
        }

        .box h2 {
            text-align: left;
            margin-bottom: 15px;
        }

        /* Buttons Grid */
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .tag {
            padding: 10px 20px;
            border: 2px solid #2b6cff;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-check {
            display: none;
        }

        .onebtn {
            height: 40px;
            width: 150px;
            background-color: #2ecc71;
            font-size: 16px;
            font-weight: 700;
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;

        }

        .onebtn:active {
            background-color: red;
        }

        .inputbox {
            align-items: center;
            justify-content: center;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
    </style>
</head>

        function offlineAnalyze() {

            let bodyParts = []
            let symptoms = []
            let duration = []
            let age = []

            // Collect values
            document.querySelectorAll('input[name="body_part"]:checked')
                .forEach(el => bodyParts.push(el.value))

            document.querySelectorAll('input[name="symptom"]:checked')
                .forEach(el => symptoms.push(el.value))

            document.querySelectorAll('input[name="duration"]:checked')
                .forEach(el => duration.push(el.value))

            document.querySelectorAll('input[name="age"]:checked')
                .forEach(el => age.push(el.value))

            let result = {
                injury: "General condition",
                risk: "LOW",
                steps: [],
                doctor: []
            }

            // 🔥 LOGIC START

            // Bleeding case (HIGH PRIORITY)
            if (symptoms.includes("Bleeding")) {
                result.injury = "Open wound / cut"
                result.risk = "HIGH"
                result.steps = [
                    "Apply pressure to stop bleeding",
                    "Clean with water",
                    "Use clean bandage"
                ]
                result.doctor = ["If bleeding does not stop", "Deep cut"]
            }

            // Burn case
            else if (symptoms.includes("Burning sensation") || bodyParts.includes("Skin")) {
                result.injury = "Possible burn or skin irritation"
                result.risk = "MODERATE"
                result.steps = [
                    "Cool area with water for 10 minutes",
                    "Do not apply ice directly",
                    "Cover with clean cloth"
                ]
                result.doctor = ["If blisters form", "Severe pain"]
            }

            // Sprain / swelling
            else if (symptoms.includes("Pain") && symptoms.includes("Swelling")) {
                result.injury = "Possible sprain or injury"
                result.risk = "MODERATE"
                result.steps = [
                    "Take rest",
                    "Apply ice",
                    "Keep area elevated"
                ]
                result.doctor = ["If pain increases", "Unable to move"]
            }

            // Infection / irritation
            else if (symptoms.includes("Redness") && symptoms.includes("Itching")) {
                result.injury = "Skin infection or allergy"
                result.risk = "LOW"
                result.steps = [
                    "Keep area clean",
                    "Avoid scratching",
                    "Use mild cream"
                ]
                result.doctor = ["If it spreads", "No improvement in 2 days"]
            }

            // Fever case
            else if (symptoms.includes("Fever")) {
                result.injury = "Possible infection"
                result.risk = "MODERATE"
                result.steps = [
                    "Drink fluids",
                    "Take rest",
                    "Monitor temperature"
                ]
                result.doctor = ["High fever", "More than 2 days"]
            }

            // Default
            else {
                result.steps = [
                    "Keep area clean",
                    "Monitor symptoms",
                    "Avoid irritation"
                ]
                result.doctor = ["If symptoms increase"]
            }

            // ⏱ Duration impact
            if (duration.includes("More then 2 Days")) {
                result.risk = "HIGH"
                result.doctor.push("Problem lasting too long")
            }

            // 👶 Age safety
            if (age.includes("Below 5 Years")) {
                result.doctor.push("Extra care needed for children")
            }

            // 🎯 Risk emoji
            let riskSymbol = "🟢"
            if (result.risk === "MODERATE") riskSymbol = "🟡"
            if (result.risk === "HIGH") riskSymbol = "🔴"

            // 🧾 OUTPUT

            document.getElementById("result").innerHTML = `
        <div class="box">
            <h3> Possible Issue</h3>
            <br>
            <p>${result.injury}</p>
        </div>

        <div class="box">
            <h3> Risk Level</h3>
            <br>
            <p>${riskSymbol} ${result.risk}</p>
        </div>

        <div class="box">
            <h3> First Aid Steps</h3>
            <br>
            <ul>
                ${result.steps.map(s => `<li>${s}</li>`).join("")}
            </ul>
        </div>

        <div class="box">
            <h3> See Doctor When</h3>
            <br>
            <ul>
                ${result.doctor.map(s => `<li>${s}</li>`).join("")}
            </ul>
        </div>
    `
        }
